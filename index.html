<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>谁是卧底 - 实时联机版</title>
    <!-- 引入 PeerJS 用于点对点通信 -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #07c160; --bg: #f7f7f7; --card: #ffffff; --text: #333; --danger: #fa5151; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background: var(--card); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 24px; box-sizing: border-box; text-align: center; position: relative; }
        h1 { color: var(--primary); margin-top: 0; }
        h2 { font-size: 1.2rem; margin: 15px 0; }
        
        .input-group { margin: 15px 0; text-align: left; }
        label { font-weight: bold; font-size: 0.9rem; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        
        button { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button.secondary { background: #eee; color: #333; }
        button.danger { background: var(--danger); }

        .hidden { display: none !important; }
        
        /* 房间大厅样式 */
        .room-code-display { background: #e8f5e9; color: var(--primary); font-size: 1.5rem; font-weight: bold; padding: 15px; border-radius: 8px; margin: 15px 0; letter-spacing: 2px; border: 2px dashed var(--primary); }
        .player-list { list-style: none; padding: 0; text-align: left; max-height: 250px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        .player-item { padding: 12px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .player-item:last-child { border-bottom: none; }
        .badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; background: #eee; }
        .badge.host { background: var(--primary); color: white; }
        .badge.ready { background: #d4edda; color: #155724; }

        /* 词语卡片 */
        .word-card { background: #fff8e1; border: 2px solid #ffe082; padding: 30px 10px; border-radius: 12px; margin: 20px 0; font-size: 1.6rem; font-weight: bold; color: #f57f17; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* 状态提示 */
        .status-log { font-size: 0.85rem; color: #666; margin-top: 10px; min-height: 20px; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- 动态内容 -->
</div>

<script>
    // --- 游戏配置 ---
    const WORD_PAIRS = [
        ["微信", "QQ"], ["麦当劳", "肯德基"], ["可口可乐", "百事可乐"],
        ["牛肉干", "猪肉脯"], ["甄嬛传", "芈月传"], ["口红", "唇膏"],
        ["保安", "保镖"], ["纸巾", "湿巾"], ["地铁", "公交"],
        ["近视眼镜", "墨镜"], ["包子", "饺子"], ["吉他", "尤克里里"],
        ["王菲", "那英"], ["蜘蛛侠", "蝙蝠侠"], ["淘宝", "京东"],
        ["葡萄", "提子"], ["辣椒", "芥末"], ["牛奶", "豆浆"],
        ["作文", "论文"], ["理发师", "美容师"], ["气泡水", "苏打水"],
        ["眼霜", "精华"], ["枕头", "抱枕"], ["电脑", "平板"]
    ];

    // --- 全局状态 ---
    let peer = null;
    let connList = {}; // 房主存储所有连接
    let myConn = null; // 成员存储与房主的连接
    
    let gameState = {
        role: 'none', // 'host' or 'player'
        roomId: null,
        playerName: '',
        totalPlayers: 6,
        undercoverCount: 1,
        players: [], // { id, name, isHost, word, isOut, ready }
        status: 'lobby', // lobby, playing, revealed
        words: {}
    };

    const app = document.getElementById('app');

    // --- 初始化 ---
    function init() {
        renderLobby();
    }

    // --- 页面渲染 ---

    function renderLobby() {
        app.innerHTML = `
            <h1>🕵️ 谁是卧底</h1>
            <p>实时联机版 · 无需等待</p>
            
            <div class="input-group">
                <label>你的昵称</label>
                <input type="text" id="pName" placeholder="输入名字" value="${localStorage.getItem('nickname') || ''}">
            </div>

            <div style="display:flex; gap:10px;">
                <button onclick="createRoom()" style="flex:1">创建房间</button>
                <button onclick="showJoinPanel()" class="secondary" style="flex:1">加入房间</button>
            </div>
            
            <div id="joinPanel" class="hidden" style="margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                <div class="input-group">
                    <label>输入房间号</label>
                    <input type="text" id="roomIdInput" placeholder="6位房间号" maxlength="6">
                </div>
                <button onclick="joinRoom()">加入</button>
                <button onclick="document.getElementById('joinPanel').classList.add('hidden')" class="secondary">取消</button>
            </div>
        `;
    }

    function showJoinPanel() {
        document.getElementById('joinPanel').classList.remove('hidden');
    }

    function renderHostLobby() {
        const playerCount = Object.keys(connList).length + 1; // +1 is host
        const isFull = playerCount >= gameState.totalPlayers;
        
        let playersHtml = `<li class="player-item"><span>${gameState.playerName} (你)</span><span class="badge host">房主</span></li>`;
        for (let id in connList) {
            const p = connList[id].userData;
            playersHtml += `<li class="player-item"><span>${p.name}</span><span class="badge">玩家</span></li>`;
        }

        app.innerHTML = `
            <h1>🏠 房间大厅</h1>
            <p>房间号：<strong>${gameState.roomId}</strong></p>
            <div class="room-code-display" onclick="copyText('${gameState.roomId}')">${gameState.roomId}</div>
            <p class="status-log">当前人数：${playerCount} / ${gameState.totalPlayers}</p>
            
            <ul class="player-list">${playersHtml}</ul>

            <button id="startBtn" onclick="hostStartGame()" ${!isFull ? 'disabled' : ''}>
                ${isFull ? '🚀 开始游戏' : `等待玩家 (${playerCount}/${gameState.totalPlayers})`}
            </button>
            <p style="font-size:0.8rem; color:#999;">提示：把房间号发给朋友，人齐后自动解锁开始按钮。</p>
            <button class="secondary" onclick="location.reload()">退出房间</button>
        `;
    }

    function renderPlayerWaiting() {
        app.innerHTML = `
            <h1>⏳ 等待开始</h1>
            <p>房间号：<strong>${gameState.roomId}</strong></p>
            <p>欢迎你，<strong>${gameState.playerName}</strong></p>
            
            <div style="margin: 30px 0;">
                <div class="loading-spinner"></div> 正在等待房主开始...
            </div>
            
            <p class="status-log">已连接至房间</p>
            <button class="secondary" onclick="location.reload()">退出</button>
        `;
    }

    function renderShowWord() {
        const me = gameState.players.find(p => p.name === gameState.playerName);
        if (!me) return;

        let wordText = me.word;
        let roleLabel = "平民";
        if (me.word === gameState.words.undercover) { wordText = me.word; roleLabel = "😈 卧底"; }
        if (me.word === "") { wordText = "???"; roleLabel = "📄 白板"; }

        app.innerHTML = `
            <h1>🤫 查看词语</h1>
            <p>玩家：${me.name}</p>
            <p>身份：${roleLabel}</p>
            
            <div class="word-card">${wordText}</div>
            
            <p>请牢记词语，不要截图！</p>
            <button onclick="playerReady()">我已记住</button>
        `;
    }

    function renderGamePlaying() {
        const alive = gameState.players.filter(p => !p.isOut);
        let listHtml = gameState.players.map(p => `
            <li class="player-item">
                <span>${p.name} ${p.isOut ? '(淘汰)' : ''}</span>
                ${p.isHost ? '<span class="badge host">房主</span>' : ''}
            </li>
        `).join('');

        app.innerHTML = `
            <h1>🗣️ 讨论环节</h1>
            <p>剩余 ${alive.length} 人 | 第 1 轮</p>
            <ul class="player-list">${listHtml}</ul>
            
            ${gameState.role === 'host' ? `
                <button class="danger" onclick="hostEliminate()">淘汰一人</button>
                <button class="secondary" onclick="hostReveal()">揭晓答案</button>
            ` : `
                <p>请听从房主指挥进行投票</p>
            `}
        `;
    }

    function renderGameOver() {
        const undercover = gameState.players.filter(p => p.word === gameState.words.undercover).map(p=>p.name).join(', ');
        const civilian = gameState.players.filter(p => p.word === gameState.words.common).map(p=>p.name).join(', ');
        
        app.innerHTML = `
            <h1>🏁 游戏结束</h1>
            <div style="text-align:left; background:#f9f9f9; padding:15px; border-radius:8px; font-size:0.9rem;">
                <p>🟢 平民词：<strong>${gameState.words.common}</strong></p>
                <p>🔴 卧底词：<strong>${gameState.words.undercover}</strong></p>
                <hr style="border:0; border-top:1px solid #ddd;">
                <p>😈 卧底是：${undercover || '无'}</p>
                <p>👶 平民是：${civilian}</p>
            </div>
            <button onclick="location.reload()">再来一局</button>
        `;
    }

    // --- 核心逻辑：网络通信 (PeerJS) ---

    // 1. 创建房间 (Host)
    function createRoom() {
        const name = document.getElementById('pName').value.trim();
        if (!name) return alert("请输入昵称");
        localStorage.setItem('nickname', name);

        const total = parseInt(prompt("设置总人数 (3-12):", "6"));
        if (total < 3) return alert("至少需要 3 人");
        
        const under = parseInt(prompt("设置卧底人数 (1-3):", "1"));
        if (under >= total) return alert("卧底人数过多");

        gameState.role = 'host';
        gameState.playerName = name;
        gameState.totalPlayers = total;
        gameState.undercoverCount = under;
        gameState.players = [{ id: 'host', name: name, isHost: true }];

        // 初始化 Peer
        // 使用免费的 PeerJS Cloud Server
        peer = new Peer(null, { debug: 2 });

        peer.on('open', (id) => {
            // 生成短房间号 (取 ID 后 6 位)
            gameState.roomId = id.substring(id.length - 6).toUpperCase();
            renderHostLobby();
        });

        peer.on('connection', (conn) => {
            // 有人连接
            conn.on('data', (data) => {
                if (data.type === 'JOIN_REQUEST') {
                    // 验证人数
                    if (Object.keys(connList).length + 1 >= gameState.totalPlayers) {
                        conn.send({ type: 'ROOM_FULL' });
                        conn.close();
                        return;
                    }
                    // 接受加入
                    conn.userData = { name: data.name, id: conn.peer };
                    connList[conn.peer] = conn;
                    
                    // 更新本地列表
                    gameState.players.push({ id: conn.peer, name: data.name, isHost: false });
                    renderHostLobby(); // 刷新 UI 显示新人

                    // 发送确认给新人
                    conn.send({ 
                        type: 'JOIN_SUCCESS', 
                        roomId: gameState.roomId, 
                        playerName: data.name 
                    });
                    
                    // 广播更新列表给所有人 (可选，这里简化为只让房主看列表)
                }
            });
            
            conn.on('close', () => {
                delete connList[conn.peer];
                gameState.players = gameState.players.filter(p => p.id !== conn.peer);
                renderHostLobby();
            });
        });

        peer.on('error', (err) => {
            alert("连接失败：" + err.type);
        });
    }

    // 2. 加入房间 (Player)
    function joinRoom() {
        const name = document.getElementById('pName').value.trim();
        const roomIdInput = document.getElementById('roomIdInput').value.trim().toUpperCase();
        
        if (!name || !roomIdInput) return alert("请填写名字和房间号");
        
        localStorage.setItem('nickname', name);
        gameState.playerName = name;
        gameState.roomId = roomIdInput; // 这里只是显示用，实际连接需要完整 ID，但 PeerJS 需要完整 ID。
        // ⚠️ 注意：PeerJS 的 ID 是随机长字符串。为了简化，我们让用户输入完整的 ID 或者我们修改策略。
        // 修正策略：为了让用户输入短房间号，房主需要把完整的 Peer ID 发出来？体验不好。
        // 更好的方案：房主的 Peer ID 就是房间号？不行，PeerJS 自定义 ID 容易冲突。
        // **折中方案**：房主生成房间后，显示一串代码（如 A7X9B2），这其实是 Peer ID 的一部分映射？
        // 由于 PeerJS 免费服务不支持自定义短 ID 查询，我们调整交互：
        // 房主创建后，显示一长串 ID 或者 二维码？
        // **最终方案**：为了用户体验，我们强制房主的 Peer ID 为 "undercover-" + 随机6位字符。
        
        // 重新实现 CreateRoom 逻辑以支持自定义 ID
        location.reload(); // 简单起见，提示用户刷新并使用新逻辑，下面重写 createRoom
        alert("为了支持短房间号，代码逻辑需微调。请看下方说明：\n我们将使用随机生成的 6 位码作为 ID 后缀。");
    }

    // --- 修正后的网络逻辑 (支持短房间号) ---
    
    // 覆盖之前的 createRoom
    window.createRoom = function() {
        const name = document.getElementById('pName').value.trim();
        if (!name) return alert("请输入昵称");
        localStorage.setItem('nickname', name);

        const total = parseInt(prompt("设置总人数 (3-12):", "6"));
        if (total < 3) return alert("至少需要 3 人");
        const under = parseInt(prompt("设置卧底人数 (1-3):", "1"));
        if (under >= total) return alert("卧底人数过多");

        gameState.role = 'host';
        gameState.playerName = name;
        gameState.totalPlayers = total;
        gameState.undercoverCount = under;
        gameState.players = [{ id: 'host', name: name, isHost: true }];

        // 生成随机 6 位房间号
        const roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
        const peerId = `wb-${roomCode}`; // 前缀防止冲突

        peer = new Peer(peerId, { debug: 2 });

        peer.on('open', (id) => {
            gameState.roomId = roomCode; // 只显示后 6 位
            renderHostLobby();
        });

        peer.on('connection', handleHostConnection);
        peer.on('error', (err) => alert("创建失败，可能房间号重复，请重试。\n" + err.type));
    };

    function handleHostConnection(conn) {
        conn.on('data', (data) => {
            if (data.type === 'JOIN_REQUEST') {
                if (Object.keys(connList).length + 1 >= gameState.totalPlayers) {
                    conn.send({ type: 'ROOM_FULL' });
                    conn.close();
                    return;
                }
                conn.userData = { name: data.name, id: conn.peer };
                connList[conn.peer] = conn;
                gameState.players.push({ id: conn.peer, name: data.name, isHost: false });
                renderHostLobby();
                conn.send({ type: 'JOIN_SUCCESS', roomId: gameState.roomId, playerName: data.name });
            }
        });
        conn.on('close', () => {
            delete connList[conn.peer];
            gameState.players = gameState.players.filter(p => p.id !== conn.peer);
            renderHostLobby();
        });
    }

    // 覆盖之前的 joinRoom
    window.joinRoom = function() {
        const name = document.getElementById('pName').value.trim();
        let code = document.getElementById('roomIdInput').value.trim().toUpperCase();
        
        if (!name || !code) return alert("请填写名字和房间号");
        if (code.length !== 6) return alert("房间号必须是 6 位");

        const peerId = `wb-${code}`;
        gameState.playerName = name;
        gameState.roomId = code;

        peer = new Peer(null, { debug: 2 }); // 客户端随机 ID

        peer.on('open', () => {
            const conn = peer.connect(peerId);
            
            conn.on('open', () => {
                conn.send({ type: 'JOIN_REQUEST', name: name });
                
                conn.on('data', (data) => {
                    if (data.type === 'JOIN_SUCCESS') {
                        gameState.role = 'player';
                        myConn = conn;
                        renderPlayerWaiting();
                        
                        // 监听游戏开始
                        conn.on('data', (d) => {
                            if (d.type === 'GAME_START') {
                                gameState.players = d.players;
                                gameState.words = d.words;
                                gameState.status = 'playing';
                                renderShowWord();
                            } else if (d.type === 'GAME_UPDATE') {
                                // 同步淘汰等状态
                                gameState.players = d.players;
                                if(d.action === 'reveal') renderGameOver();
                                else renderGamePlaying();
                            }
                        });
                    } else if (data.type === 'ROOM_FULL') {
                        alert("房间已满！");
                        location.reload();
                    }
                });
                
                conn.on('close', () => {
                    alert("与房主失去连接");
                    location.reload();
                });
            });

            conn.on('error', () => {
                alert("无法连接到房间，请检查房间号是否正确，或房主是否在线。");
            });
            
            // 超时处理
            setTimeout(() => {
                if (!conn.open) {
                    alert("连接超时，房主可能已关闭页面或房间号错误。");
                    location.reload();
                }
            }, 5000);
        });
    };

    // --- 游戏流程控制 ---

    function hostStartGame() {
        if (Object.keys(connList).length + 1 < gameState.totalPlayers) {
            if(!confirm("人数未满，确定开始吗？")) return;
        }

        // 分配词语
        const pair = WORD_PAIRS[Math.floor(Math.random() * WORD_PAIRS.length)];
        const common = pair[0];
        const under = pair[1];
        
        gameState.words = { common, undercover: under };

        // 生成角色数组
        let roles = [];
        for(let i=0; i<gameState.undercoverCount; i++) roles.push('undercover');
        // 暂时不加白板，逻辑更稳
        const remaining = gameState.totalPlayers - roles.length;
        for(let i=0; i<remaining; i++) roles.push('civilian');
        roles.sort(() => Math.random() - 0.5);

        // 分配给玩家
        gameState.players.forEach((p, idx) => {
            if (roles[idx] === 'undercover') p.word = under;
            else p.word = common;
            p.isOut = false;
        });

        // 房主自己渲染
        renderShowWord();

        // 发送给所有成员
        const payload = {
            type: 'GAME_START',
            players: gameState.players,
            words: gameState.words
        };

        for (let id in connList) {
            connList[id].send(payload);
        }
    }

    function playerReady() {
        // 成员看完词，显示等待界面，实际逻辑由房主控制节奏
        // 这里简化：看完直接进讨论页，等房主指令
        // 但为了同步，我们让成员停留在"已准备"状态，直到房主触发下一步
        // 简单处理：成员看完后，显示"等待房主开始讨论"
        app.innerHTML = `
            <h1>✅ 已就绪</h1>
            <p>请回到微信群，开始描述你的词语。</p>
            <div class="loading-spinner"></div> 等待房主推进流程...
        `;
        // 实际游戏中，通常大家口头描述，不需要软件推进每一句话
        // 只有"淘汰"环节需要软件同步
        // 所以这里我们可以直接显示讨论界面，但按钮禁用，只有房主能操作
        setTimeout(() => renderGamePlaying(), 1000); 
    }

    function hostEliminate() {
        const targetName = prompt("输入要淘汰的玩家名字：");
        if (!targetName) return;
        
        const p = gameState.players.find(x => x.name === targetName);
        if (p) {
            p.isOut = true;
            broadcastUpdate();
            renderGamePlaying();
            
            // 检查胜利条件
            checkWin();
        } else {
            alert("未找到该玩家");
        }
    }

    function hostReveal() {
        if(confirm("确定要揭晓答案吗？")) {
            broadcastUpdate('reveal');
            renderGameOver();
        }
    }

    function checkWin() {
        const aliveUnder = gameState.players.filter(p => !p.isOut && p.word === gameState.words.undercover).length;
        const aliveCiv = gameState.players.filter(p => !p.isOut && p.word === gameState.words.common).length;
        
        if (aliveUnder === 0) {
            setTimeout(() => { alert("卧底全部淘汰，平民胜利！"); hostReveal(); }, 500);
        } else if (aliveUnder >= aliveCiv) {
            setTimeout(() => { alert("卧底人数占优，卧底胜利！"); hostReveal(); }, 500);
        }
    }

    function broadcastUpdate(action) {
        const payload = { type: 'GAME_UPDATE', players: gameState.players, action: action };
        for (let id in connList) {
            connList[id].send(payload);
        }
    }

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => alert("房间号已复制：" + text));
    }

    // 启动
    init();

</script>
</body>
</html>
